name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install uv
        run: python -m pip install uv

      - name: Install dependencies
        run: uv sync --extra dev --locked

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy wyze_devices.py test_wyze_devices.py

      - name: Test
        run: uv run python -m unittest

      - name: Build package
        run: uv build

      - name: Smoke test console script
        shell: bash
        run: |
          python -m venv smoke-venv
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            PYTHON="smoke-venv/Scripts/python"
            CLI="smoke-venv/Scripts/wyze-local-devices.exe"
          else
            PYTHON="smoke-venv/bin/python"
            CLI="smoke-venv/bin/wyze-local-devices"
          fi
          "$PYTHON" -m pip install --no-deps dist/*.whl
          "$CLI" --help
          "$CLI" skill --json
